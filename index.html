<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>MOVVO Elite</title>
    <style>
        :root { --accent: #007aff; --bg: #f2f2f7; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Layout de Telas */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 20px; box-sizing: border-box; }
        #page-resumo { transform: translateX(0); }
        #page-mapa { transform: translateX(100%); }

        /* Estilo iOS */
        .glass-card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .chip { display: inline-block; padding: 8px 16px; border-radius: 20px; background: #e5e5ea; font-size: 14px; margin: 5px; }
        
        /* Barra de Navegação */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; z-index: 10; border-top: 1px solid #d1d1d6; }
        .btn-fab { width: 64px; height: 64px; background: var(--accent); border-radius: 50%; color: white; border: none; font-size: 30px; box-shadow: 0 8px 16px rgba(0,122,255,0.4); }
    </style>
</head>
<body>

    <div id="page-resumo" class="page">
        <h1>Resumo</h1>
        <div class="glass-card">
            <p>Meta do dia</p>
            <h2 id="saldo">R$ 0,00</h2>
        </div>
        <h3>Sugestão de Registro</h3>
        <div id="smart-chips"></div>
    </div>

    <div id="page-mapa" class="page">
        <h1>Mapa de Calor</h1>
        <div class="glass-card" style="height: 300px;"></div>
    </div>

    <nav class="tab-bar">
        <button onclick="nav('resumo')">Resumo</button>
        <button class="btn-fab" onclick="quickCapture()">+</button>
        <button onclick="nav('mapa')">Mapa</button>
    </nav>

    <script>
        // Registrar Service Worker para Offline-First
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Navegação
        function nav(p) {
            document.getElementById('page-resumo').style.transform = p === 'resumo' ? 'translateX(0)' : 'translateX(-100%)';
            document.getElementById('page-mapa').style.transform = p === 'mapa' ? 'translateX(0)' : 'translateX(100%)';
        }

        // IA Local (Auto-fill de Contexto)
        function updateSuggestions() {
            const h = new Date().getHours();
            const suggestions = h < 12 ? ["Uber", "Combustível"] : ["Almoço", "Bebida", "Corre"];
            const container = document.getElementById('smart-chips');
            container.innerHTML = suggestions.map(s => `<div class="chip" onclick="registrar('${s}')">${s}</div>`).join('');
        }

        updateSuggestions();
    </script>
</body>
</html>
