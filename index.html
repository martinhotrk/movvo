<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOVVO - Seu Corre Privado</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --island-bg: rgba(21, 29, 48, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            overflow-x: hidden;
        }

        /* --- TELA DE LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .login-card h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-card p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .btn-login {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .login-toggle-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent-color);
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }

        .login-toggle-link:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* --- DYNAMIC ISLAND (NOTIFICAÇÕES) --- */
        .dynamic-island-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .dynamic-island {
            background-color: var(--island-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            max-width: 320px;
            height: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dynamic-island.expanded {
            border-radius: 20px;
            padding: 15px 25px;
            height: auto;
            min-width: 260px;
        }

        .island-content {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- INTERFACE PRINCIPAL --- */
        header {
            width: 100%;
            max-width: 480px;
            margin-top: 70px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard {
            width: 100%;
            max-width: 480px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .card.full-width {
            grid-column: span 2;
            align-items: center;
            padding: 25px;
            background: linear-gradient(135deg, #151d30 0%, #1e2942 100%);
        }

        .card h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: #9ca3af;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 22px;
            font-weight: 700;
        }

        .card.full-width .value {
            font-size: 36px;
            margin-top: 5px;
        }

        .positivo { color: #10b981; }
        .negativo { color: #ef4444; }

        /* --- TECLADO E FLUXO DE ENTRADA --- */
        .input-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tab-menu {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 100px;
            padding: 4px;
            width: 100%;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #9ca3af;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active.ganho {
            background-color: #10b981;
            color: white;
        }

        .tab-btn.active.gasto {
            background-color: #ef4444;
            color: white;
        }

        .display {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 25px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-color);
            font-size: 24px;
            font-weight: 600;
            border-radius: 100px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .key.action {
            background: var(--accent-color);
            color: white;
        }
        .key.action:active {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card" id="login-form-container">
            <h2 id="login-title">Entrar no MOVVO</h2>
            <p id="login-subtitle">Por favor, insira suas credenciais para acessar seu painel.</p>
            
            <div id="inputs-wrapper"></div>
            
            <button class="btn-login" onclick="executarAutenticacao()" id="btn-acao-login">Entrar</button>
            <div id="toggle-container">
                <a class="login-toggle-link" id="login-toggle" onclick="alternarModoCadastro()">Criar uma conta</a>
            </div>
        </div>
    </div>

    <div class="dynamic-island-container">
        <div class="dynamic-island" id="island">
            <div class="island-content" id="island-text">Buscando totais... 🕒</div>
        </div>
    </div>

    <header>
        <div>
            <h1>MOVVO</h1>
            <p style="font-size: 12px; color: #9ca3af;" id="txt-welcome">Painel Privado</p>
        </div>
        <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </header>

    <div class="dashboard">
        <div class="card full-width">
            <h3>Lucro do Dia</h3>
            <div class="value" id="lucro-total">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Faturamento</h3>
            <div class="value positivo" id="ganhos-total">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Gastos</h3>
            <div class="value negativo" id="gastos-total">R$ 0,00</div>
        </div>
    </div>

    <div class="input-container">
        <div class="tab-menu">
            <button class="tab-btn active ganho" onclick="mudarFluxo('ganho', this)">Faturamento</button>
            <button class="tab-btn gasto" onclick="mudarFluxo('gasto', this)">Gasto</button>
        </div>

        <div class="display" id="valor-display">R$ 0,00</div>

        <div class="keyboard">
            <div class="key" onclick="digitar(1)">1</div>
            <div class="key" onclick="digitar(2)">2</div>
            <div class="key" onclick="digitar(3)">3</div>
            <div class="key" onclick="digitar(4)">4</div>
            <div class="key" onclick="digitar(5)">5</div>
            <div class="key" onclick="digitar(6)">6</div>
            <div class="key" onclick="digitar(7)">7</div>
            <div class="key" onclick="digitar(8)">8</div>
            <div class="key" onclick="digitar(9)">9</div>
            <div class="key" onclick="digitar('C')">C</div>
            <div class="key" onclick="digitar(0)">0</div>
            <div class="key action" onclick="processarEnvioCorre()">✓</div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO: Certifique-se de manter sua URL gerada aqui
        const API_URL = "https://script.google.com/macros/s/AKfycbzaequ07xuHZOQp0NqAt51Rck3r1KZ8c8rRmZwIeYS_TNOT6fyLQ6GikfRxRw2kH5qhPQ/exec";

        let currentFluxo = 'ganho';
        let currentInputValue = 0; 
        let loginMode = 'completo'; 

        document.addEventListener("DOMContentLoaded", () => {
            verificarStatusAutenticacao();
        });

        function verificarStatusAutenticacao() {
            const usuarioSalvo = localStorage.getItem('movvo_user');
            const wrapper = document.getElementById('inputs-wrapper');
            const toggleBtn = document.getElementById('login-toggle');
            
            if (usuarioSalvo) {
                loginMode = 'pin';
                document.getElementById('login-title').innerText = "Bloqueio de Tela";
                document.getElementById('login-subtitle').innerText = `Olá, ${usuarioSalvo}. Digite seu PIN de 4 dígitos para acessar.`;
                document.getElementById('btn-acao-login').innerText = "Desbloquear";
                if(toggleBtn) toggleBtn.style.display = 'none';
                
                wrapper.innerHTML = `
                    <div class="input-group">
                        <label>PIN de Acesso</label>
                        <input type="password" id="login-pin" maxlength="4" pattern="\\d*" inputmode="numeric" placeholder="****" autofocus>
                    </div>
                `;
                document.getElementById('login-overlay').style.display = 'flex';
            } else if (loginMode === 'cadastro') {
                document.getElementById('login-title').innerText = "Criar Conta MOVVO";
                document.getElementById('login-subtitle').innerText = "Cadastre-se para começar a rastrear seus corres.";
                document.getElementById('btn-acao-login').innerText = "Cadastrar Conta";
                if(toggleBtn) {
                    toggleBtn.style.display = 'inline-block';
                    toggleBtn.innerText = "Já tenho uma conta. Entrar";
                }

                wrapper.innerHTML = `
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="reg-nome" placeholder="Ex: Pablo Santos" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="reg-senha" placeholder="Crie uma senha estável" required>
                    </div>
                    <div class="input-group">
                        <label>PIN Rápido (4 dígitos)</label>
                        <input type="password" id="reg-pin" maxlength="4" pattern="\\d*" inputmode="numeric" placeholder="Ex: 1234" required>
                    </div>
                `;
            } else {
                loginMode = 'completo';
                document.getElementById('login-title').innerText = "Entrar no MOVVO";
                document.getElementById('login-subtitle').innerText = "Insira seu e-mail e senha cadastrados para continuar.";
                document.getElementById('btn-acao-login').innerText = "Entrar";
                if(toggleBtn) {
                    toggleBtn.style.display = 'inline-block';
                    toggleBtn.innerText = "Criar uma conta";
                }
                
                wrapper.innerHTML = `
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="login-senha" placeholder="Sua senha" required>
                    </div>
                `;
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        function alternarModoCadastro() {
            if (loginMode === 'completo') {
                loginMode = 'cadastro';
            } else {
                loginMode = 'completo';
            }
            verificarStatusAutenticacao();
        }

        function executarAutenticacao() {
            const btnAcao = document.getElementById('btn-acao-login');
            btnAcao.innerText = "Processando... 🕒";
            btnAcao.disabled = true;

            // ROTA DE CADASTRO ATUALIZADA PARA GET (IMUNE A COMPORTAMENTOS DE CORS)
            if (loginMode === 'cadastro') {
                const nome = document.getElementById('reg-nome').value;
                const email = document.getElementById('reg-email').value;
                const senha = document.getElementById('reg-senha').value;
                const pin = document.getElementById('reg-pin').value;

                const urlCadastro = `${API_URL}?acao=cadastrar_usuario&nome=${encodeURIComponent(nome)}&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}&pin=${encodeURIComponent(pin)}`;

                fetch(urlCadastro)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        localStorage.setItem('movvo_user', data.usuario.email);
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('txt-welcome').innerText = `Painel: ${data.usuario.nome}`;
                        
                        acionarIsland("Conta Criada! 🎉");
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        carregarTotais();
                    } else {
                        alert(data.message || "Erro ao realizar o cadastro.");
                        btnAcao.disabled = false;
                        verificarStatusAutenticacao();
                    }
                })
                .catch(err => {
                    alert("Erro ao conectar com o servidor.");
                    btnAcao.disabled = false;
                    verificarStatusAutenticacao();
                });
                return;
            }

            // ROTAS TRADICIONAIS VIA GET (LOGIN E PIN)
            let urlValidacao = "";
            if (loginMode === 'completo') {
                const email = document.getElementById('login-email').value;
                const senha = document.getElementById('login-senha').value;
                urlValidacao = `${API_URL}?acao=login&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}`;
            } else {
                const email = localStorage.getItem('movvo_user');
                const pin = document.getElementById('login-pin').value;
                urlValidacao = `${API_URL}?acao=validar_pin&email=${encodeURIComponent(email)}&pin=${encodeURIComponent(pin)}`;
            }

            fetch(urlValidacao)
                .then(res => res.json())
                .then(data => {
                    if (data.sucesso) {
                        if (loginMode === 'completo') {
                            localStorage.setItem('movvo_user', data.email);
                        }
                        
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('txt-welcome').innerText = `Painel: ${data.usuario}`;
                        
                        acionarIsland("Acesso Liberado! 🔑");
                        carregarTotais();
                    } else {
                        alert(data.erro || "Falha na validação.");
                        btnAcao.disabled = false;
                        verificarStatusAutenticacao();
                    }
                })
                .catch(err => {
                    alert("Erro ao conectar ao servidor de login.");
                    btnAcao.disabled = false;
                    verificarStatusAutenticacao();
                });
        }

        function fazerLogout() {
            if(confirm("Deseja sair da sua conta? Você precisará realizar o login completo novamente.")) {
                localStorage.clear();
                loginMode = 'completo';
                verificarStatusAutenticacao();
            }
        }

        function carregarTotais() {
            const usuarioLogado = localStorage.getItem('movvo_user') || '';
            if (!usuarioLogado) return;

            fetch(`${API_URL}?acao=get_totais&email=${encodeURIComponent(usuarioLogado)}`)
                .then(response => response.json())
                .then(totais => {
                    if(totais.sucesso) {
                        document.getElementById("ganhos-total").innerText = formatarMoeda(totais.ganhos);
                        document.getElementById("gastos-total").innerText = formatarMoeda(totais.gastos);
                        
                        const lucroElement = document.getElementById("lucro-total");
                        lucroElement.innerText = formatarMoeda(totais.lucro);
                        
                        if(totais.lucro >= 0) {
                            lucroElement.className = "value positivo";
                        } else {
                            lucroElement.className = "value negativo";
                        }
                        fecharIsland("Painel Atualizado ⚡");
                    } else {
                        acionarIsland("Erro na resposta dos totais ❌");
                    }
                })
                .catch(error => {
                    acionarIsland("Erro ao carregar dados ❌");
                    console.error("Erro:", error);
                });
        }

        function processarEnvioCorre() {
            if (currentInputValue === 0) {
                acionarIsland("Digite um valor válido! ⚠️");
                return;
            }

            let valorFinal = currentInputValue / 100;
            let ganhos = currentFluxo === 'ganho' ? valorFinal : 0;
            let gastos = currentFluxo === 'gasto' ? valorFinal : 0;
            const usuarioLogado = localStorage.getItem('movvo_user') || '';

            if(!usuarioLogado) {
                acionarIsland("Usuário não identificado ❌");
                return;
            }

            acionarIsland("Registrando Corre... ⚡");

            const payloadText = JSON.stringify({ 
                acao: "registrar", 
                email: usuarioLogado, 
                ganhos: ganhos, 
                gastos: gastos 
            });

            fetch(API_URL, {
                method: "POST",
                body: payloadText
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    if (currentFluxo === 'ganho') {
                        confetti({ particleCount: 80, spread: 60, origin: { y: 0.8 } });
                    }
                    currentInputValue = 0;
                    atualizarDisplay();
                    carregarTotais();
                } else {
                    acionarIsland(data.message || "Erro ao salvar dados ❌");
                }
            })
            .catch(error => {
                acionarIsland("Erro na conexão ❌");
                console.error("Erro:", error);
            });
        }

        function digitar(num) {
            if (num === 'C') {
                currentInputValue = 0;
            } else {
                if (currentInputValue.toString().length >= 8) return; 
                currentInputValue = (currentInputValue * 10) + num;
            }
            atualizarDisplay();
        }

        function atualizarDisplay() {
            document.getElementById("valor-display").innerText = formatarMoeda(currentInputValue / 100);
        }

        function mudarFluxo(tipo, elemento) {
            currentFluxo = tipo;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'ganho', 'gasto'));
            elemento.classList.add('active', tipo);
        }

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function acionarIsland(texto) {
            const island = document.getElementById("island");
            const islandText = document.getElementById("island-text");
            island.classList.add("expanded");
            islandText.innerText = texto;
        }

        function fecharIsland(textoFinal) {
            const island = document.getElementById("island");
            const islandText = document.getElementById("island-text");
            islandText.innerText = textoFinal;
            setTimeout(() => {
                island.classList.remove("expanded");
            }, 2000);
        }
    </script>
</body>
</html>
